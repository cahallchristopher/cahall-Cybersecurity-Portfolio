<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>
  <style>
    body { font-family: Arial, sans-serif; width: 280px; padding: 16px; background: #0f172a; color: #f1f5f9; margin: 0; }
    h1 { font-size: 18px; color: #f8fafc; margin: 0 0 12px 0; }
    #status { font-size: 14px; font-weight: bold; padding: 10px; border-radius: 6px; background: #1e293b; margin-bottom: 8px; }
    #count { font-size: 11px; color: #64748b; margin-bottom: 10px; }
    button { padding: 7px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; margin-right: 5px; margin-bottom: 5px; }
    #updateBtn { background: #1d4ed8; color: white; width: 100%; }
    #safeBtn { background: #16a34a; color: white; }
    #dangerBtn { background: #dc2626; color: white; }
    #feedback { font-size: 11px; color: #94a3b8; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>🛡️ PhishGuard</h1>
  <div id="status">Checking page...</div>
  <p id="count"></p>
  <button id="updateBtn">🔄 Update threat list</button>
  <br>
  <button id="safeBtn">✅ Mark as safe</button>
  <button id="dangerBtn">🚨 Confirm threat</button>
  <p id="feedback"></p>
  <script src="popup.js"></script>
</body>
</html>
